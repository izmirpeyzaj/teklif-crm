version: '3.8'

services:
  app:
    build: .
    container_name: offr-site-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./db:/app/db
      - ./public/uploads:/app/public/uploads
